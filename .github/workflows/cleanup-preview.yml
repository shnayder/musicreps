name: Cleanup Preview

on:
  delete:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.event.ref, 'claude/')
    steps:
      - name: Checkout (for deploy script)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Cleanup preview
        run: bash scripts/deploy-gh-pages.sh cleanup "${{ github.event.ref }}"
