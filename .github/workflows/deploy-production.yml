name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node (for esbuild)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: deno lint

      - name: Format check
        run: deno fmt --check

      - name: Type check
        run: deno check src/**/*.ts

      - name: Test
        run: deno test --no-check --allow-read --allow-run=deno

      - name: Get commit count
        id: commit-count
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get total commit count via GitHub API (avoids fetching full history)
          COUNT=$(gh api "repos/${{ github.repository }}/commits?sha=main&per_page=1" \
            --include 2>/dev/null \
            | grep -i '^link:' \
            | sed 's/.*page=\([0-9]*\)>; rel="last".*/\1/')
          if [ -z "$COUNT" ]; then COUNT=1; fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build
        run: deno task build
        env:
          BUILD_NUMBER: ${{ steps.commit-count.outputs.count }}

      - name: Deploy to gh-pages
        run: bash scripts/deploy-gh-pages.sh production
