  border: 1px solid var(--color-border-light);
  padding: 0.4rem 0.7rem;
  text-align: center;
}
.stats-table th {
  background: var(--color-surface);
  font-weight: var(--font-semibold);
}
.stats-cell {
  width: 40px;
  height: 28px;
  border-radius: var(--radius-sm);
  padding: 0;
  box-sizing: border-box;
}

/* --- Stats grids (math modes) --- */
.stats-grid-wrapper {
  overflow-x: auto;
  margin: var(--gap-group) 0;
}
.stats-grid {
  border-collapse: collapse;
  margin: 0 auto;
  font-size: var(--text-sm);
}
.stats-grid th, .stats-grid td {
  border: 1px solid var(--color-border-light);
  padding: 0.2rem 0.3rem;
  text-align: center;
}
.stats-grid th {
  background: var(--color-surface);
  font-weight: var(--font-semibold);
  font-size: var(--text-xs);
}
.stats-grid .stats-cell {
  width: 30px;
  height: 24px;
}
.stats-grid-row-label {
  font-weight: var(--font-semibold);
  background: var(--color-surface);
  padding: 0.2rem 0.4rem;
}

/* --- Interactive fretboard (multi-tap modes) --- */
/* No response zone → prompt takes all of QuizStage. */
.quiz-stage-prompt:only-child {
  flex: 1;
}
.interactive-fretboard {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding: var(--gap-group) 0;
}
.interactive-fretboard > div:last-child {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
/* fretboard-wrapper, fretboard-container, and svg.fretboard
   inherit flex-chain-friendly sizing from general rules. */
/* interactive-fretboard-status and interactive-fretboard-progress removed:
   answer counter is no longer shown (free-entry mode). */
.speed-tap-stats {
  font-size: var(--text-xs);
}
.speed-tap-stats th, .speed-tap-stats td {
  padding: 0.2rem 0.3rem;
}
.speed-tap-stats .stats-cell {
  width: 24px;
  height: 20px;
}

/* ==========================================================================
   17. SEQUENTIAL SLOTS
   ========================================================================== */
.seq-slots {
  display: flex;
  justify-content: center;
  gap: var(--gap-group);
  margin: var(--pad-component) 0;
  min-height: 2.5rem;
}
/* Card container — wraps slots + correction row in all phases */
.seq-card {
  background: var(--color-well);
  border: 1px solid var(--color-border-lighter);
  border-radius: var(--radius-md);
  padding: var(--gap-group) var(--pad-component);
  min-width: 20rem;
  max-width: 24rem;
  margin: 0 auto var(--gap-group);
}
/* Dotted placeholder showing where the next note will appear */
.seq-placeholder {
  border-bottom-style: dashed !important;
  border-bottom-color: var(--color-text-light) !important;
}
/* --- Component tokens: SequentialSlot --- */
.seq-slot {
  --_text: var(--color-text-muted);
  --_border: var(--color-border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.5rem;
  padding: 0 0.25rem;
  height: 2.5rem;
  border: none;
  border-bottom: 2px solid var(--_border);
  border-radius: 0;
  font-size: var(--type-quiz-response-size);
  font-weight: var(--type-quiz-response-weight);
  background: transparent;
  color: var(--_text);
  transition:
    border-color var(--duration-base) ease,
    color var(--duration-base) ease;
}
.seq-slot.active {
  --_border: var(--color-accent);
}
.seq-slot.filled {
  --_border: var(--color-text);
  --_text: var(--color-text);
}
.seq-slot.correct {
  --_border: var(--color-success);
  --_text: var(--color-success-text);
}
.seq-slot.wrong {
  --_border: var(--color-error);
  --_text: var(--color-error-text);
}
.seq-slots-container {
  display: inline-flex;
  flex-direction: column;
  align-items: stretch;
}
.seq-correct-row {
  display: flex;
  justify-content: center;
  gap: var(--gap-group);
  margin-top: var(--gap-micro);
}
.seq-correct-note {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.5rem;
  padding: 0 0.25rem;
  font-size: var(--type-quiz-response-size);
  font-weight: var(--type-quiz-response-weight);
  color: var(--color-success-text);
}

/* --- Focus-visible (keyboard navigation) --- */
:focus-visible {
  outline: 2px solid var(--color-brand);
  outline-offset: 2px;
}
/* Remove default outline for mouse/touch users */
:focus:not(:focus-visible) {
  outline: none;
}
/* Specific overrides for elements that need different focus styling */
.home-mode-btn:focus-visible {
  outline-offset: -2px;
}

/* Toggle buttons — inset outline, white on active (green) background */
.string-toggle:focus-visible,
.distance-toggle:focus-visible,
.notes-toggle:focus-visible {
  outline-offset: -2px;
}
.string-toggle.active:focus-visible,
.distance-toggle.active:focus-visible,
.notes-toggle.active:focus-visible {
  outline-color: white;
}

/* Answer buttons */
.answer-btn:focus-visible {
  outline-offset: -2px;
}

/* Close buttons */
.close-btn:focus-visible {
  outline-offset: -2px;
}

/* Settings page */
.segmented-btn:focus-visible {
  outline-offset: -2px;
}
.segmented-btn.active:focus-visible {
  outline-color: white;
}

/* Baseline, recommendation buttons */
.baseline-rerun-btn:focus-visible,
.suggestion-card-accept:focus-visible {
  outline-offset: 2px;
}

/* ==========================================================================
   18. REDUCED MOTION
   ========================================================================== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* Standalone / native app — no decorative side borders */
@media (display-mode: standalone) {
  body {
    border-left: none;
    border-right: none;
  }
}
body.native-app {
  border-left: none;
  border-right: none;
}

/* ==========================================================================
   19. MOBILE LAYOUT
   ========================================================================== */
@media (max-width: 599px) {
  :root {
    --size-content-inset: var(--gap-group);
  }

  body {
    margin: 0;
    padding: 0;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: 0;
    border-left: none;
    border-right: none;
  }

  /* .quiz-controls margin-top:auto pushes controls toward the bottom;
     extra padding so they clear the screen edge on mobile. */
  .quiz-area {
    padding: 0 var(--pad-component) var(--pad-component);
  }

  .next-btn,
  .start-btn,
  .feedback-notice,
  .page-action-row {
    width: 80%;
  }

  /* Prevent iOS zoom on input focus */
  input, button {
    font-size: 16px;
  }
}
