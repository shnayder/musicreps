:root {
  /* Brand / Success (deep green — unified) */
  --color-brand: #2e7d32;
  --color-brand-dark: #1b5e20;
  --color-brand-bg: #e8f5e9;
  --color-success: #2e7d32;
  --color-success-dark: #1b5e20;
  --color-success-bg: #e8f5e9;
  --color-success-text: #1b5e20;
  /* Error */
  --color-error: #f44336;
  --color-error-bg: #ffebee;
  --color-error-text: #c62828;
  /* Focus */
  --color-focus: #2e7d32;
  --color-focus-bg: #e8f5e9;
  /* Gold accents (highlights, recommendations, achievements) */
  --color-recommended: #d4a017;
  --color-highlight: #eab308;
  /* UI accents */
  --color-toggle-active: #2e7d32;
  --color-toggle-recommended: hsl(44, 80%, 46%); /* gold */
  /* Text (warm neutrals) */
  --color-text: hsl(30, 5%, 20%);
  --color-text-muted: hsl(30, 3%, 40%);
  --color-text-light: hsl(30, 3%, 60%);
  /* Surfaces & backgrounds (warm neutrals) */
  --color-bg: #fff;
  --color-surface: hsl(30, 10%, 96%);
  --color-surface-hover: hsl(30, 8%, 93%);
  --color-surface-alt: hsl(30, 8%, 92%);
  --color-surface-pressed: hsl(30, 5%, 82%);
  --color-surface-accent: hsl(30, 8%, 90%);
  /* Borders (warm neutrals) */
  --color-border: hsl(30, 5%, 60%);
  --color-border-light: hsl(30, 5%, 80%);
  --color-border-lighter: hsl(30, 5%, 86%);
  /* Overlay */
  --color-overlay: rgba(0, 0, 0, 0.35);

  /* Heatmap scale (gold → green, matches palette: attention → mastered) */
  --heatmap-none: hsl(30, 4%, 85%);
  --heatmap-1: hsl(44, 65%, 58%);
  --heatmap-2: hsl(54, 45%, 52%);
  --heatmap-3: hsl(68, 30%, 46%);
  --heatmap-4: hsl(90, 38%, 38%);
  --heatmap-5: hsl(122, 46%, 33%);

  /* Typography scale */
  --text-xs: 0.75rem;
  --text-sm: 0.85rem;
  --text-base: 1rem;
  --text-md: 1.125rem;
  --text-lg: 1.3rem;
  --text-xl: 1.5rem;
  --text-2xl: 2rem;

  /* Font families */
  --font-display: 'DM Serif Display', Georgia, serif;

  /* Spacing scale */
  --space-1: 0.125rem;
  --space-2: 0.25rem;
  --space-3: 0.5rem;
  --space-4: 0.75rem;
  --space-5: 1rem;
  --space-6: 1.5rem;
}

* {
  -webkit-tap-highlight-color: transparent;
}
html {
  background: var(--color-surface);
  overscroll-behavior: none;
}
body {
  font-family: system-ui, -apple-system, sans-serif;
  max-width: 650px;
  margin: 0 auto;
  padding: 0 var(--space-5);
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
  padding-left: max(var(--space-5), env(safe-area-inset-left, 0));
  padding-right: max(var(--space-5), env(safe-area-inset-right, 0));
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
  color: var(--color-text);
  background: var(--color-bg);
  border-left: 1px solid var(--color-border-lighter);
  border-right: 1px solid var(--color-border-lighter);
  overscroll-behavior: none;
}

/* --- Home screen --- */
.home-screen {
  display: flex;
  flex-direction: column;
  padding: var(--space-5);
}
.home-screen.hidden {
  display: none;
}
.home-header {
  text-align: left;
  padding: var(--space-6) 0 var(--space-4);
}
.home-title {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: 400;
  color: var(--color-text);
  margin: 0;
}
.home-title::after {
  content: '';
  display: block;
  width: 32px;
  height: 3px;
  background: var(--color-brand);
  margin: var(--space-3) 0 0;
  border-radius: 2px;
}
.home-modes {
  flex: 1;
}
.home-group-label {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-text-muted);
  margin-top: 2rem;
  margin-bottom: var(--space-2);
}
.home-group-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-border-lighter);
}
.home-group-label:first-child {
  margin-top: 0;
}
.home-mode-btn {
  display: flex;
  flex-direction: column;
  width: 100%;
  text-align: left;
  padding: var(--space-4) var(--space-4);
  padding-right: 2rem;
  background: var(--color-bg);
  border: 1px solid var(--color-border-lighter);
  border-left: 3px solid var(--color-brand);
  border-radius: 10px;
  margin-bottom: var(--space-2);
  cursor: pointer;
  position: relative;
}
.home-mode-btn::after {
  content: '\203A';
  position: absolute;
  right: var(--space-4);
  top: 50%;
  transform: translateY(-50%);
  font-size: var(--text-base);
  color: var(--color-text-light);
  line-height: 1;
}
.home-mode-btn:hover {
  background: var(--color-surface);
}
.home-mode-btn:active {
  background: var(--color-surface-pressed);
}
.home-mode-name {
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--color-text);
}
.home-mode-desc {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
}
.home-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) 0;
  border-top: 1px solid var(--color-border-lighter);
  margin-top: var(--space-4);
}
/* --- Text link (reusable) --- */
.text-link {
  color: var(--color-text-muted);
  font-size: var(--text-sm);
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  padding: var(--space-2) 0;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
}
.text-link:hover {
  color: var(--color-text);
  text-decoration: underline;
}
.text-link:active {
  color: var(--color-text);
}
.version {
  font-size: var(--text-xs);
  color: var(--color-text-light);
}

/* --- Mode top bar --- */
.mode-top-bar {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  margin-bottom: var(--space-3);
}
.mode-back-btn {
  background: none;
  border: none;
  font-size: var(--text-xl);
  cursor: pointer;
  padding: var(--space-2);
  min-width: 44px;
  min-height: 44px;
  color: var(--color-text-muted);
  margin: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
}
.mode-back-btn:hover {
  background: var(--color-surface-hover);
}
.mode-back-btn:active {
  background: var(--color-surface-pressed);
}
.mode-title {
  margin: 0;
  font-size: var(--text-lg);
  font-weight: 600;
  flex: 1;
}
/* Hide back button during active quiz and calibration; keep title visible */
.phase-active .mode-back-btn,
.phase-calibration .mode-back-btn,
.phase-round-complete .mode-back-btn {
  display: none;
}
.phase-active .mode-top-bar,
.phase-calibration .mode-top-bar,
.phase-round-complete .mode-top-bar {
  margin-bottom: 0;
}

/* --- Settings modal --- */
.settings-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--color-overlay);
  z-index: 200;
  justify-content: center;
  align-items: center;
}
.settings-overlay.open {
  display: flex;
}
.settings-modal {
  background: var(--color-bg);
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
  width: 280px;
  max-width: 90vw;
  overflow: hidden;
}
.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--color-border);
}
.settings-title {
  font-weight: 600;
  font-size: var(--text-base);
}
.settings-close-btn {
  background: none;
  border: none;
  font-size: var(--text-xl);
  cursor: pointer;
  color: var(--color-text);
  padding: 0;
  line-height: 1;
  opacity: 0.6;
}
.settings-close-btn:hover {
  opacity: 1;
}
.settings-close-btn:active {
  opacity: 0.4;
}
.settings-body {
  padding: var(--space-5);
}
.settings-field {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}
.settings-label {
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text-muted);
}
.settings-toggle-group {
  display: flex;
  gap: 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--color-border);
}
.settings-toggle-btn {
  flex: 1;
  padding: var(--space-3) var(--space-4);
  border: none;
  background: var(--color-surface);
  cursor: pointer;
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text);
  transition: background 0.15s ease, color 0.15s ease;
}
.settings-toggle-btn + .settings-toggle-btn {
  border-left: 1px solid var(--color-border);
}
.settings-toggle-btn.active {
  background: var(--color-brand);
  color: white;
}
.settings-toggle-btn:hover:not(.active) {
  background: var(--color-surface-hover);
}
.settings-toggle-btn:active {
  opacity: 0.8;
}

/* --- Mode screens --- */
.mode-screen {
  display: none;
  padding-top: var(--space-3);
  flex: 1;
}
.mode-screen.mode-active {
  display: block;
}

/* --- Phase-driven visibility --- */
.quiz-session {
  position: relative;
}
.phase-idle .quiz-session {
  display: none;
}

/* Hide tabs and tab content during non-idle phases */
/* .tab-content.active needs explicit override (higher specificity than .tab-content.active display:block) */
.phase-active .mode-tabs,
.phase-active .tab-content,
.phase-active .tab-content.active,
.phase-calibration .mode-tabs,
.phase-calibration .tab-content,
.phase-calibration .tab-content.active,
.phase-round-complete .mode-tabs,
.phase-round-complete .tab-content,
.phase-round-complete .tab-content.active {
  display: none;
}

/* Element-level visibility (replaces inline style="display: none;") */
.mastery-message {
  display: none;
}
.mastery-message.mastery-visible {
  display: block;
}
.round-complete {
  display: none;
}
.phase-round-complete .round-complete {
  display: block;
}
.stats-container.stats-hidden {
  display: none;
}
.fretboard-wrapper.fretboard-hidden {
  display: none;
}

/* --- Mode tabs (Practice / Progress) --- */
.mode-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--color-border-lighter);
  margin-bottom: var(--space-5);
}
.mode-tab {
  flex: 1;
  padding: var(--space-3) var(--space-5);
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  background: none;
  font-size: var(--text-base);
  font-weight: 500;
  color: var(--color-text-muted);
  cursor: pointer;
  transition: color 0.15s ease, border-color 0.15s ease;
}
.mode-tab:hover {
  color: var(--color-text);
}
.mode-tab.active {
  color: var(--color-brand-dark);
  border-bottom-color: var(--color-brand);
  font-weight: 600;
}
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}

/* --- Practice card --- */
.practice-card {
  margin-bottom: var(--space-4);
  padding: var(--space-4) var(--space-5);
  background: var(--color-surface);
  border-radius: 8px;
}
.practice-zone + .practice-zone {
  margin-top: var(--space-5);
  padding-top: var(--space-5);
}
.practice-section-header {
  font-weight: 600;
  font-size: var(--text-base);
  color: var(--color-text);
  text-align: left;
  margin-bottom: var(--space-3);
}
.practice-status {
  margin-bottom: 0;
}
.practice-status:empty,
.practice-status-label:empty {
  display: none;
}
.practice-status-label {
  font-weight: 600;
  font-size: var(--text-base);
  color: var(--color-text);
}
.practice-status-detail {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  display: block;
}
.practice-status-detail:empty {
  display: none;
}
.practice-recommendation {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-wrap: wrap;
}
.practice-recommendation:empty,
.practice-rec-text:empty ~ .practice-rec-btn {
  display: none;
}
.practice-rec-text {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
}
.practice-rec-text:empty {
  display: none;
}
.practice-rec-btn {
  font-size: var(--text-xs);
  font-weight: 500;
  padding: var(--space-2) var(--space-4);
  border: 1px solid var(--color-brand);
  border-radius: 6px;
  background: var(--color-brand-bg);
  color: var(--color-brand-dark);
  cursor: pointer;
  margin: 0;
  transition: background 0.15s ease;
}
.practice-rec-btn:hover {
  background: var(--color-brand);
  color: white;
}
.practice-rec-btn.hidden {
  display: none;
}

/* --- Practice scope (inside practice card) --- */
.practice-scope {
  margin-top: var(--space-4);
}
.practice-scope .settings-row {
  margin-bottom: 0;
}

/* --- Practice action zone (inside practice card) --- */
.practice-zone-action {
  text-align: center;
}

/* --- Baseline info (Progress tab) --- */
.baseline-info {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  padding: var(--space-4) 0;
  margin-top: var(--space-4);
  border-top: 1px solid var(--color-border-lighter);
}
.baseline-info:empty {
  display: none;
}
.baseline-text {
  margin-bottom: var(--space-3);
}
.baseline-default-tag {
  font-style: italic;
  color: var(--color-text-light);
}
.baseline-rerun-btn {
  background: none;
  border: 1px solid var(--color-border-light);
  border-radius: 6px;
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--color-text-muted);
  cursor: pointer;
  margin: 0;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.baseline-rerun-btn:hover {
  background: var(--color-surface-hover);
  border-color: var(--color-border);
}
.baseline-rerun-btn:active {
  background: var(--color-surface-pressed);
}

/* --- Progress tab stats controls (within tab) --- */
.tab-content .stats-controls {
  text-align: left;
  margin: var(--space-3) 0;
  padding-bottom: var(--space-2);
}

/* --- Fretboard --- */
.fretboard-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}
.string-toggles {
  display: flex;
  flex-direction: row;
  gap: var(--space-1);
  justify-content: center;
}
.string-toggle {
  width: 36px;
  height: 36px;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  background: var(--color-surface);
  color: var(--color-border);
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  padding: 0;
  margin: 0;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}
.string-toggle:hover {
  background: var(--color-surface-hover);
}
.string-toggle.active {
  background: var(--color-toggle-active);
  color: white;
  border-color: var(--color-toggle-active);
}
.string-toggle.recommended {
  box-shadow: 0 0 0 2px var(--color-toggle-recommended);
}
.string-toggle.active.recommended {
  border-color: var(--color-toggle-recommended);
}
.distance-toggles {
  display: flex;
  flex-direction: row;
  gap: var(--space-1);
  justify-content: center;
}
.distance-toggle {
  height: 36px;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  background: var(--color-surface);
  color: var(--color-border);
  font-size: var(--text-xs);
  font-weight: 500;
  cursor: pointer;
  padding: 0 0.4rem;
  margin: 0;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}
.distance-toggle:hover {
  background: var(--color-surface-hover);
}
.distance-toggle.active {
  background: var(--color-toggle-active);
  color: white;
  border-color: var(--color-toggle-active);
}
.distance-toggle.recommended {
  box-shadow: 0 0 0 2px var(--color-toggle-recommended);
}
.distance-toggle.active.recommended {
  border-color: var(--color-toggle-recommended);
}
.notes-toggles {
  display: flex;
  flex-direction: row;
  gap: var(--space-1);
  justify-content: center;
}
.notes-toggle {
  height: 36px;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  background: var(--color-surface);
  color: var(--color-border);
  font-size: var(--text-xs);
  font-weight: 500;
  cursor: pointer;
  padding: 0 0.6rem;
  margin: 0;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}
.notes-toggle:hover {
  background: var(--color-surface-hover);
}
.notes-toggle.active {
  background: var(--color-toggle-active);
  color: white;
  border-color: var(--color-toggle-active);
}
.fretboard-container {
  position: relative;
  width: 100%;
  min-width: 0;
  max-width: 1200px;
}
.fretboard {
  width: 100%;
  height: auto;
  display: block;
  background: var(--color-bg);
  touch-action: manipulation;
}
/* SVG fretboard — new circle-based design */
.fb-string {
  stroke: hsl(30, 8%, 72%);
}
.fb-fret {
  stroke: hsl(30, 5%, 82%);
}
.fb-nut {
  fill: hsl(30, 8%, 48%);
}
.fb-marker {
  fill: hsl(30, 5%, 62%);
}
.fb-pos {
  fill: hsl(30, 5%, 90%);
  stroke: none;
  cursor: pointer;
  transition: fill 0.15s;
}

/* Hover card */
.hover-card {
  position: absolute;
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.12s;
}
.hover-card.visible {
  opacity: 1;
}
.hc-inner {
  background: var(--color-bg);
  border: 1px solid var(--color-border-light);
  border-radius: 8px;
  padding: 0.35rem 0.5rem;
  min-width: 65px;
  box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
  text-align: center;
}
.hc-note {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-text);
}
.hc-string-fret {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-top: 0.05rem;
}
.hc-detail {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-top: 0.12rem;
}
.hc-bar {
  height: 3px;
  border-radius: 2px;
  background: hsl(30, 5%, 90%);
  margin-top: 0.25rem;
  overflow: hidden;
}
.hc-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.2s;
}

.settings-row {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}
button {
  padding: var(--space-3) var(--space-6);
  font-size: var(--text-base);
  cursor: pointer;
  margin: 0 var(--space-3);
}
.mastery-message {
  background: var(--color-success-bg);
  color: var(--color-success-text);
  font-weight: bold;
  font-size: var(--text-base);
  padding: var(--space-3) var(--space-5);
  margin-bottom: var(--space-3);
  border-radius: 6px;
  text-align: center;
}

/* --- Primary CTA (Start Quiz) --- */
.start-btn {
  background: var(--color-brand);
  color: white;
  border: 2px solid var(--color-brand);
  border-radius: 8px;
  font-weight: 600;
  font-size: var(--text-md);
  padding: var(--space-4) var(--space-6);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
  transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
}
.start-btn:hover {
  background: var(--color-brand-dark);
  border-color: var(--color-brand-dark);
  box-shadow: 0 3px 12px rgba(0, 0, 0, 0.18);
}
.start-btn:active {
  transform: scale(0.98);
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
}

/* --- Quiz countdown row — bar + timer side by side --- */
.quiz-countdown-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}
.quiz-countdown-bar {
  flex: 1;
  height: 4px;
  background: var(--color-surface-alt);
  margin-left: calc(-1 * var(--space-5));
}
.quiz-countdown-fill {
  height: 100%;
  background: var(--color-brand);
  transition: width 0.2s linear;
  width: 100%;
}
.round-timer-warning .quiz-countdown-fill,
.last-question .quiz-countdown-fill {
  background: var(--color-recommended);
}
.quiz-info-time {
  font-size: var(--text-xs);
  font-variant-numeric: tabular-nums;
  color: var(--color-text-muted);
  white-space: nowrap;
}

/* --- Quiz session info — single compact row --- */
.quiz-session-info {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  padding: 0 var(--space-6) var(--space-2) 0;
}
.quiz-info-context {
  flex: 1;
}
.quiz-info-count {
  font-variant-numeric: tabular-nums;
}
.quiz-header-close {
  position: absolute;
  top: var(--space-3);
  right: 0;
  background: none;
  border: none;
  font-size: var(--text-xl);
  color: var(--color-text-light);
  cursor: pointer;
  padding: 0 var(--space-2);
  line-height: 1;
  margin: 0;
  border-radius: 4px;
  transition: color 0.15s ease, background 0.15s ease;
  z-index: 1;
}
.quiz-header-close:hover {
  color: var(--color-text);
  background: var(--color-surface-hover);
}

/* --- Progress bar --- */
.progress-bar {
  width: 100%;
  max-width: 300px;
  height: 20px;
  background: var(--color-surface-alt);
  border-radius: 10px;
  margin: 0 auto var(--space-4);
  overflow: hidden;
  position: relative;
}
.phase-active .progress-bar,
.phase-round-complete .progress-bar {
  display: none;
}
.progress-fill {
  height: 100%;
  background: var(--color-success);
  border-radius: 10px;
  transition: width 0.3s ease;
  min-width: 0;
}
.progress-text {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text);
  pointer-events: none;
}

/* --- Quiz-active visual focus --- */
.phase-active,
.phase-round-complete,
.phase-calibration {
  background: var(--color-bg);
  margin: 0 calc(-1 * var(--space-5));
  padding: 0 var(--space-5);
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}
/* --- Quiz area (subtle card containment) --- */
/* Phase-driven visibility: shown during active, round-complete, calibration */
.quiz-area {
  display: none;
  text-align: center;
  margin: var(--space-5) 0;
  border: 2px solid transparent;
}
.phase-active .quiz-area,
.phase-round-complete .quiz-area,
.phase-calibration .quiz-area {
  display: flex;
  flex-direction: column;
  justify-content: center;
  flex: 1;
  background: var(--color-bg);
  border-radius: 12px;
  padding: var(--space-5);
}
.phase-active .quiz-area {
  padding: var(--space-3) var(--space-3);
}
/* --- Round complete --- */
.round-complete {
  text-align: center;
  padding: var(--space-6) 0;
}
.round-complete-heading {
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: var(--space-3);
}
.round-complete-stats {
  margin: var(--space-3) 0 var(--space-5);
}
.round-complete-overall {
  margin-bottom: var(--space-5);
  padding-top: var(--space-4);
  border-top: 1px solid var(--color-border-lighter);
}
.round-complete-overall-label {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text-muted);
  margin-bottom: var(--space-2);
}
.round-complete-context {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
}
.round-stat-line {
  font-size: var(--text-base);
  color: var(--color-text);
  line-height: 1.6;
}
.round-complete-actions {
  display: flex;
  gap: var(--space-3);
  justify-content: center;
}
.round-complete-continue {
  padding: var(--space-3) var(--space-5);
  background: var(--color-brand);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: var(--text-base);
  font-weight: 600;
  cursor: pointer;
}
.round-complete-continue:hover {
  opacity: 0.9;
}
.round-complete-continue:active {
  opacity: 0.8;
  transform: scale(0.98);
}
.round-complete-stop {
  padding: var(--space-3) var(--space-5);
  background: none;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  border-radius: 8px;
  font-size: var(--text-base);
  cursor: pointer;
}
.round-complete-stop:hover {
  background: var(--color-surface-hover);
}
.round-complete-stop:active {
  background: var(--color-surface-pressed);
}
/* Hide quiz prompt, answer buttons, and feedback during round-complete */
.phase-round-complete .quiz-prompt-row,
.phase-round-complete .answer-buttons,
.phase-round-complete .note-buttons,
.phase-round-complete .chord-slots,
.phase-round-complete .feedback,
.phase-round-complete .hint,
.phase-round-complete .time-display,
.phase-round-complete .speed-tap-status,
.phase-round-complete .fretboard-wrapper,
.phase-round-complete .quiz-countdown-row,
.phase-round-complete .quiz-session-info,
.phase-round-complete .quiz-header-close {
  display: none;
}

/* --- Note buttons (piano-style layout) --- */
.note-buttons {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  margin: var(--space-3) auto;
}
.note-row-naturals,
.note-row-accidentals {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  column-gap: 2px; /* sub-column separator; --space-1 too wide for 14-col grid */
}
.note-row-accidentals.hidden {
  display: none;
}
/* Natural notes: each spans 2 of 14 sub-columns */
.note-row-naturals .note-btn:nth-child(1) {
  grid-column: 1 / 3;
}
.note-row-naturals .note-btn:nth-child(2) {
  grid-column: 3 / 5;
}
.note-row-naturals .note-btn:nth-child(3) {
  grid-column: 5 / 7;
}
.note-row-naturals .note-btn:nth-child(4) {
  grid-column: 7 / 9;
}
.note-row-naturals .note-btn:nth-child(5) {
  grid-column: 9 / 11;
}
.note-row-naturals .note-btn:nth-child(6) {
  grid-column: 11 / 13;
}
.note-row-naturals .note-btn:nth-child(7) {
  grid-column: 13 / 15;
}
/* Accidentals: piano black-key positioning between naturals */
.note-row-accidentals .note-btn:nth-child(1) {
  grid-column: 2 / 4;
}
.note-row-accidentals .note-btn:nth-child(2) {
  grid-column: 4 / 6;
}
.note-row-accidentals .note-btn:nth-child(3) {
  grid-column: 8 / 10;
}
.note-row-accidentals .note-btn:nth-child(4) {
  grid-column: 10 / 12;
}
.note-row-accidentals .note-btn:nth-child(5) {
  grid-column: 12 / 14;
}
.note-btn {
  min-width: 0;
  height: 48px;
  font-size: var(--text-md);
  font-weight: 500;
  border: 2px solid var(--color-text-muted);
  border-radius: 8px;
  background: var(--color-bg);
  cursor: pointer;
  padding: 0;
  touch-action: manipulation;
  transition:
    background 0.15s ease,
    border-color 0.15s ease,
    transform 0.1s ease;
}
.note-btn:hover {
  background: var(--color-surface-hover);
  border-color: var(--color-text);
}
.note-btn.accidental {
  background: var(--color-surface-accent);
}
.note-btn.accidental:hover {
  background: var(--color-surface-pressed);
}
.note-btn:active {
  background: var(--color-surface-pressed);
  transform: scale(0.97);
}
.note-btn:disabled {
  opacity: 0.5;
  cursor: default;
}
.note-btn:disabled:hover {
  background: var(--color-bg);
  border-color: var(--color-text-muted);
  transform: none;
}
.note-btn.hidden {
  display: none;
}

/* --- Quiz prompt (text modes) --- */
.quiz-prompt-row {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: var(--space-2);
  margin: var(--space-5) 0;
  min-height: 2.5rem;
}
.quiz-prompt {
  font-size: var(--text-2xl);
  font-weight: 600;
}
.quiz-prompt:empty {
  display: none;
}
.quiz-last-question {
  font-size: var(--text-sm);
  color: var(--color-recommended);
  font-weight: 500;
  text-align: center;
  margin-bottom: var(--space-2);
}
.quiz-last-question:empty {
  display: none;
}

/* --- Answer buttons grid (shared by new modes) --- */
.answer-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.4rem;
  max-width: 360px;
  margin: var(--space-3) auto;
}
.answer-btn {
  height: 48px;
  font-size: var(--text-md);
  font-weight: 500;
  border: 2px solid var(--color-text-muted);
  border-radius: 8px;
  background: var(--color-bg);
  cursor: pointer;
  padding: 0 var(--space-2);
  touch-action: manipulation;
  transition:
    background 0.15s ease,
    border-color 0.15s ease,
    transform 0.1s ease;
}
.answer-btn:hover {
  background: var(--color-surface-hover);
  border-color: var(--color-text);
}
.answer-btn:active {
  background: var(--color-surface-pressed);
  transform: scale(0.97);
}
.answer-btn:disabled {
  opacity: 0.5;
  cursor: default;
}
.answer-btn:disabled:hover {
  background: var(--color-bg);
  border-color: var(--color-text-muted);
  transform: none;
}
.answer-buttons-intervals {
  grid-template-columns: repeat(3, 1fr);
}

/* --- Answer group visibility (toggled by mode JS for bidirectional questions) --- */
.answer-group-hidden {
  display: none;
}

/* --- Calibration overlay: inside quiz-area, hide non-calibration content --- */
.phase-calibration .answer-buttons:not(.calibration-active),
.phase-calibration .note-buttons:not(.calibration-active) {
  display: none;
}
.phase-calibration .answer-buttons.calibration-active {
  display: grid;
}
.phase-calibration .note-buttons.calibration-active {
  display: flex;
}
.phase-calibration .speed-tap-status,
.phase-calibration .fretboard-wrapper {
  display: none;
}
.phase-calibration .chord-slots {
  display: none;
}
/* Calibration: hide quiz info (progress bar shows trial count instead) */
.phase-calibration .quiz-session-info {
  display: none;
}
/* Intro + results: hide buttons and progress */
.phase-calibration.calibration-intro .calibration-active,
.phase-calibration.calibration-results .calibration-active {
  display: none;
}
.phase-calibration.calibration-intro .progress-bar,
.phase-calibration.calibration-results .progress-bar {
  display: none;
}

/* --- Calibration highlight --- */
.calibration-target {
  background: var(--color-success) !important;
  border-color: var(--color-success-dark) !important;
  color: white !important;
  box-shadow: 0 0 12px rgba(76, 175, 80, 0.6);
}
.calibration-progress {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  margin-top: var(--space-3);
}
.calibration-action-btn {
  display: block;
  margin: var(--space-6) auto 0;
  padding: var(--space-4) 2.5rem;
  font-size: var(--text-md);
  font-weight: 600;
  background: var(--color-brand);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s ease;
}
.calibration-action-btn:hover {
  background: var(--color-brand-dark);
}
.calibration-action-btn:active {
  background: var(--color-brand-dark);
}
.calibration-results {
  text-align: center;
  margin: var(--space-5) auto;
  max-width: 420px;
}
.calibration-baseline {
  font-size: var(--text-md);
  font-weight: 600;
  margin: var(--space-3) 0 var(--space-5);
}
.calibration-thresholds {
  border-collapse: collapse;
  margin: 0 auto var(--space-5);
  font-size: var(--text-sm);
  width: 100%;
}
.calibration-thresholds th,
.calibration-thresholds td {
  border: 1px solid var(--color-border-light);
  padding: 0.35rem var(--space-3);
  text-align: left;
}
.calibration-thresholds th {
  background: var(--color-surface);
  font-weight: 600;
}
.calibration-thresholds td:first-child {
  font-weight: 600;
  white-space: nowrap;
}
.calibration-thresholds td:nth-child(2) {
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

/* --- Feedback --- */
.feedback {
  font-size: var(--text-xl);
  margin: var(--space-5) 0;
  min-height: 2rem;
}
.correct {
  color: var(--color-success);
}
.incorrect {
  color: var(--color-error-text);
}
.time-display {
  color: var(--color-text-muted);
  font-size: var(--text-sm);
  margin-top: var(--space-3);
}
.hint {
  color: var(--color-text-muted);
  font-size: var(--text-base);
  margin-top: var(--space-5);
}
.stats {
  margin-top: var(--space-5);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
}

/* --- Heatmap legends --- */
.heatmap-legend {
  display: none;
  flex-direction: column;
  gap: var(--space-3);
  margin: var(--space-4) 0;
}
.heatmap-legend.active {
  display: flex;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.2rem;
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}
.legend-swatch {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  border: 1px solid var(--color-border);
}
.setting-group {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  cursor: pointer;
}
.toggle-group {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: var(--space-3);
}
.toggle-group-label {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  font-weight: 500;
  flex-shrink: 0;
}

/* --- Stats tables (lookup modes) --- */
.stats-container {
  text-align: center;
  margin: var(--space-3) 0;
}
.stats-table {
  border-collapse: collapse;
  margin: var(--space-3) auto;
  font-size: var(--text-sm);
}
.stats-table th, .stats-table td {
  border: 1px solid var(--color-border-light);
  padding: 0.4rem 0.7rem;
  text-align: center;
}
.stats-table th {
  background: var(--color-surface);
  font-weight: 600;
}
.stats-cell {
  width: 40px;
  height: 28px;
  border-radius: 4px;
  padding: 0;
  box-sizing: border-box;
}

/* --- Stats grids (math modes) --- */
.stats-grid-wrapper {
  overflow-x: auto;
  margin: var(--space-3) 0;
}
.stats-grid {
  border-collapse: collapse;
  margin: 0 auto;
  font-size: var(--text-sm);
}
.stats-grid th, .stats-grid td {
  border: 1px solid var(--color-border-light);
  padding: 0.2rem 0.3rem;
  text-align: center;
}
.stats-grid th {
  background: var(--color-surface);
  font-weight: 600;
  font-size: var(--text-xs);
}
.stats-grid .stats-cell {
  width: 30px;
  height: 24px;
}
.stats-grid-row-label {
  font-weight: 600;
  background: var(--color-surface);
  padding: 0.2rem 0.4rem;
}

/* --- Speed Tap mode --- */
.speed-tap-status {
  display: flex;
  justify-content: center;
  gap: var(--space-6);
  font-size: var(--text-lg);
  margin: var(--space-3) 0;
}
.speed-tap-progress {
  font-weight: 500;
}
.speed-tap-stats {
  font-size: var(--text-xs);
}
.speed-tap-stats th, .speed-tap-stats td {
  padding: 0.2rem 0.3rem;
}
.speed-tap-stats .stats-cell {
  width: 24px;
  height: 20px;
}

/* --- Stats controls (toggle above chart) --- */
.stats-controls {
  text-align: left;
  margin: var(--space-3) 0;
  padding-bottom: var(--space-2);
}

/* --- Stats mode toggle (Recall / Speed) --- */
.stats-toggle {
  display: inline-flex;
  border: 2px solid var(--color-border);
  border-radius: 6px;
  overflow: hidden;
}
.stats-toggle-btn {
  padding: 0.35rem var(--space-5);
  font-size: var(--text-sm);
  font-weight: 500;
  border: none;
  border-radius: 0;
  background: var(--color-bg);
  color: var(--color-text-muted);
  cursor: pointer;
  margin: 0;
  transition: background 0.15s ease, color 0.15s ease;
}
.stats-toggle-btn + .stats-toggle-btn {
  border-left: 1px solid var(--color-border-light);
}
.stats-toggle-btn.active {
  background: var(--color-brand);
  color: white;
}
.stats-toggle-btn:not(.active):hover {
  background: var(--color-surface-hover);
}

/* --- Key signature answer buttons --- */
.answer-buttons-keysig {
  grid-template-columns: repeat(4, 1fr);
}

/* --- Degree answer buttons --- */
.answer-buttons-degrees {
  grid-template-columns: repeat(4, 1fr);
}

/* --- Roman numeral answer buttons --- */
.answer-buttons-numerals {
  grid-template-columns: repeat(4, 1fr);
}

/* --- Chord spelling slots --- */
.chord-slots {
  display: flex;
  justify-content: center;
  gap: var(--space-3);
  margin: var(--space-4) 0;
  min-height: 2.5rem;
}
.chord-slot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 3rem;
  height: 2.5rem;
  border: 2px solid var(--color-border);
  border-radius: 6px;
  font-size: var(--text-md);
  font-weight: 600;
  background: var(--color-surface);
  transition: border-color 0.15s ease, background 0.15s ease;
}
.chord-slot.active {
  border-color: var(--color-focus);
  background: var(--color-focus-bg);
}
.chord-slot.correct {
  border-color: var(--color-success);
  background: var(--color-success-bg);
  color: var(--color-success-text);
}
.chord-slot.wrong {
  border-color: var(--color-error);
  background: var(--color-error-bg);
  color: var(--color-error-text);
}

/* --- Focus-visible (keyboard navigation) --- */
:focus-visible {
  outline: 2px solid var(--color-brand);
  outline-offset: 2px;
}
/* Remove default outline for mouse/touch users */
:focus:not(:focus-visible) {
  outline: none;
}
/* Specific overrides for elements that need different focus styling */
.start-btn:focus-visible {
  outline-color: var(--color-brand-dark);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12), 0 0 0 4px rgba(209, 147, 27, 0.3);
}
.home-mode-btn:focus-visible {
  outline-offset: -2px;
}

/* Toggle buttons — inset outline, white on active (green) background */
.string-toggle:focus-visible,
.distance-toggle:focus-visible,
.notes-toggle:focus-visible {
  outline-offset: -2px;
}
.string-toggle.active:focus-visible,
.distance-toggle.active:focus-visible,
.notes-toggle.active:focus-visible {
  outline-color: white;
}

/* Tab buttons */
.mode-tab:focus-visible {
  outline-offset: -2px;
}

/* Answer buttons */
.answer-btn:focus-visible,
.note-btn:focus-visible {
  outline-offset: -2px;
}

/* Round-complete buttons */
.round-complete-continue:focus-visible {
  outline-color: white;
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.4);
}
.round-complete-stop:focus-visible {
  outline-offset: -2px;
}

/* Back button, close buttons */
.mode-back-btn:focus-visible,
.quiz-header-close:focus-visible {
  outline-offset: -2px;
}

/* Stats toggle */
.stats-toggle-btn:focus-visible {
  outline-offset: -2px;
}
.stats-toggle-btn.active:focus-visible {
  outline-color: white;
}

/* Settings modal */
.settings-close-btn:focus-visible {
  outline-offset: 2px;
}
.settings-toggle-btn:focus-visible {
  outline-offset: -2px;
}
.settings-toggle-btn.active:focus-visible {
  outline-color: white;
}

/* Baseline, recommendation buttons */
.baseline-rerun-btn:focus-visible,
.practice-rec-btn:focus-visible {
  outline-offset: 2px;
}

/* --- Reduced motion --- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* Mobile layout */
@media (max-width: 599px) {
  body {
    margin: 0;
    padding: 0 var(--space-1);
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
    padding-left: max(var(--space-1), env(safe-area-inset-left, 0));
    padding-right: max(var(--space-1), env(safe-area-inset-right, 0));
    border-left: none;
    border-right: none;
  }

  .quiz-countdown-bar {
    margin-left: calc(-1 * var(--space-1));
  }

  .phase-active,
  .phase-round-complete,
  .phase-calibration {
    margin: 0 calc(-1 * var(--space-1));
    padding: 0 var(--space-1);
  }

  .fretboard-container {
    width: 100%;
    max-width: none;
  }

  .answer-buttons {
    grid-template-columns: repeat(3, 1fr);
    max-width: 280px;
  }

  .quiz-prompt {
    font-size: 1.6rem;
  }

  /* Prevent iOS zoom on input focus */
  input, button {
    font-size: 16px;
  }
}
