<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing — Tablet Single</title>
    <style>
      /* Template for a single tablet screenshot with device frame + caption.
         Designed for 2064x2752 (iPad 13"). Matches phone-single visual
         language but with a wider tablet aspect ratio and smaller corner
         radius. */

      @font-face {
        font-family: 'Gabarito';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url(../../src/Gabarito-latin.woff2) format('woff2');
      }
      @font-face {
        font-family: 'Plus Jakarta Sans';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url(../../src/PlusJakartaSans-latin.woff2) format('woff2');
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-color: #1a2f23;
        --bg-gradient: linear-gradient(
          170deg,
          #2d4c3b 0%,
          #1a2f23 50%,
          #162618 100%
        );
        --caption-color: #f5f0e8;
        --subcaption-color: #b8c4b0;
        --frame-color: #111;
        --frame-radius: 44px;
        --frame-bezel: 14px;
        --screen-radius: 30px;
      }

      html, body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        background: var(--bg-gradient);
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .caption-area {
        flex: 0 0 18%;
        width: 100%;
        padding: 0 8%;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .caption {
        font-family: 'Gabarito', system-ui, sans-serif;
        font-size: 4vw;
        font-weight: 700;
        color: var(--caption-color);
        line-height: 1.15;
        letter-spacing: -0.01em;
      }

      .subcaption {
        font-size: 2vw;
        font-weight: 400;
        color: var(--subcaption-color);
        margin-top: 1.2vw;
        line-height: 1.3;
      }

      .subcaption:empty {
        display: none;
      }

      .device-frame {
        flex: 1 1 auto;
        max-width: 80%;
        max-height: 78%;
        position: relative;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tablet-body {
        height: 100%;
        /* iPad 13" screen aspect ratio (1032×1376 logical) */
        aspect-ratio: 1032 / 1376;
        background: var(--frame-color);
        border-radius: var(--frame-radius);
        padding: var(--frame-bezel);
        position: relative;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.08),
          0 20px 60px rgba(0, 0, 0, 0.5),
          0 8px 20px rgba(0, 0, 0, 0.3);
      }

      .tablet-screen {
        width: 100%;
        height: 100%;
        border-radius: var(--screen-radius);
        overflow: hidden;
        position: relative;
        background: #000;
      }

      .tablet-screen img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .bottom-pad {
        flex: 0 0 2%;
      }
    </style>
  </head>
  <body>
    <div class="caption-area">
      <div class="caption" id="caption">Caption text</div>
      <div class="subcaption" id="subcaption"></div>
    </div>
    <div class="device-frame">
      <div class="tablet-body">
        <div class="tablet-screen">
          <img id="screenshot" src="" alt="App screenshot">
        </div>
      </div>
    </div>
    <div class="bottom-pad"></div>
  </body>
</html>
