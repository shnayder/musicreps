<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing — Phone Single</title>
    <style>
      /* Template for a single phone screenshot with device frame + caption.
         Designed for 1320x2868 (iPhone 6.9") but scales to any viewport.
         The pipeline sets the Playwright viewport to exact store dimensions. */

      @font-face {
        font-family: 'Gabarito';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url(../../src/Gabarito-latin.woff2) format('woff2');
      }
      @font-face {
        font-family: 'Plus Jakarta Sans';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url(../../src/PlusJakartaSans-latin.woff2) format('woff2');
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-color: #1a2f23;
        --bg-gradient: linear-gradient(
          170deg,
          #2d4c3b 0%,
          #1a2f23 50%,
          #162618 100%
        );
        --caption-color: #f5f0e8;
        --subcaption-color: #b8c4b0;
        --frame-color: #111;
        --frame-radius: 52px;
        --frame-bezel: 10px;
        --screen-radius: 44px;
        --dynamic-island-width: 126px;
        --dynamic-island-height: 36px;
      }

      html, body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        background: var(--bg-gradient);
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* --- Caption area --- */
      .caption-area {
        flex: 0 0 auto;
        width: 100%;
        padding: 10% 8% 4%;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .caption {
        font-family: 'Gabarito', system-ui, sans-serif;
        font-size: 5.8vw;
        font-weight: 700;
        color: var(--caption-color);
        line-height: 1.15;
        letter-spacing: -0.01em;
      }

      .subcaption {
        font-size: 3vw;
        font-weight: 400;
        color: var(--subcaption-color);
        margin-top: 2vw;
        line-height: 1.3;
      }

      .subcaption:empty {
        display: none;
      }

      /* --- Device frame --- */
      .device-frame {
        flex: 1 1 auto;
        max-width: 72%;
        max-height: 74%;
        position: relative;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .phone-body {
        height: 100%;
        aspect-ratio: 402 / 873;
        background: var(--frame-color);
        border-radius: var(--frame-radius);
        padding: var(--frame-bezel);
        position: relative;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.08),
          0 20px 60px rgba(0, 0, 0, 0.5),
          0 8px 20px rgba(0, 0, 0, 0.3);
      }

      .phone-screen {
        width: 100%;
        height: 100%;
        border-radius: var(--screen-radius);
        overflow: hidden;
        position: relative;
        background: #000;
      }

      /* Dynamic Island */
      .phone-screen::before {
        content: '';
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: var(--dynamic-island-width);
        height: var(--dynamic-island-height);
        background: #000;
        border-radius: 20px;
        z-index: 2;
      }

      .phone-screen img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Bottom breathing room */
      .bottom-pad {
        flex: 0 0 1.5%;
      }
    </style>
  </head>
  <body>
    <div class="caption-area">
      <div class="caption" id="caption">Caption text</div>
      <div class="subcaption" id="subcaption"></div>
    </div>
    <div class="device-frame">
      <div class="phone-body">
        <div class="phone-screen">
          <img id="screenshot" src="" alt="App screenshot">
        </div>
      </div>
    </div>
    <div class="bottom-pad"></div>
  </body>
</html>
