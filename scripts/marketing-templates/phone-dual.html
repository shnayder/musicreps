<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing — Phone Dual</title>
<style>
  /* Two phone screenshots side-by-side with shared caption.
     Designed for 1320x2868 (iPhone 6.9") but scales to any viewport. */

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-color: #1a2f23;
    --bg-gradient: linear-gradient(170deg, #2D4C3B 0%, #1a2f23 50%, #162618 100%);
    --caption-color: #f5f0e8;
    --subcaption-color: #b8c4b0;
    --frame-color: #111;
    --frame-radius: 36px;
    --frame-bezel: 7px;
    --screen-radius: 30px;
    --dynamic-island-width: 86px;
    --dynamic-island-height: 25px;
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg-gradient);
    background-color: var(--bg-color);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .caption-area {
    flex: 0 0 auto;
    width: 100%;
    padding: 8% 8% 3%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .caption {
    font-size: 4.2vw;
    font-weight: 700;
    color: var(--caption-color);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .subcaption {
    font-size: 2.4vw;
    font-weight: 400;
    color: var(--subcaption-color);
    margin-top: 1.2vw;
    line-height: 1.3;
  }

  .subcaption:empty { display: none; }

  /* --- Two phones side-by-side --- */
  .phones-row {
    flex: 1 1 auto;
    width: 88%;
    max-height: 74%;
    display: flex;
    gap: 4%;
    align-items: center;
    justify-content: center;
  }

  .phone-body {
    height: 100%;
    max-width: 44%;
    aspect-ratio: 402 / 873;
    background: var(--frame-color);
    border-radius: var(--frame-radius);
    padding: var(--frame-bezel);
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 20px 60px rgba(0,0,0,0.5),
      0 8px 20px rgba(0,0,0,0.3);
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: var(--screen-radius);
    overflow: hidden;
    position: relative;
    background: #000;
  }

  .phone-screen::before {
    content: '';
    position: absolute;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    width: var(--dynamic-island-width);
    height: var(--dynamic-island-height);
    background: #000;
    border-radius: 14px;
    z-index: 2;
  }

  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .bottom-pad {
    flex: 0 0 3%;
  }
</style>
</head>
<body>
  <div class="caption-area">
    <div class="caption" id="caption">Caption text</div>
    <div class="subcaption" id="subcaption"></div>
  </div>
  <div class="phones-row">
    <div class="phone-body">
      <div class="phone-screen">
        <img id="screenshot-0" src="" alt="App screenshot 1">
      </div>
    </div>
    <div class="phone-body">
      <div class="phone-screen">
        <img id="screenshot-1" src="" alt="App screenshot 2">
      </div>
    </div>
  </div>
  <div class="bottom-pad"></div>
</body>
</html>
